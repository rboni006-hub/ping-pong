<!DOCTYPE html>
<html>
<head>
    <title>Very much pong by meeeee :)</title>
    <style>
        body { background: #024d25; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: Arial; }
        canvas { border: 2px solid #fff; background: #38b070; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Objects
        const paddleWidth = 10, paddleHeight = 100;
        let playerY = canvas.height / 2 - paddleHeight / 2;
        let aiY = canvas.height / 2 - paddleHeight / 2;
        let ballX = canvas.width / 2, ballY = canvas.height / 2;
        let ballSpeedX = 5, ballSpeedY = 5;
        let playerScore = 0, aiScore = 0;
        const ballSize = 16;

        // --- NEW: Game State ---
        let isGameRunning = false; 

        // Player Controls
        document.addEventListener('mousemove', (e) => {
            if (!isGameRunning) return; // Don't move paddle if game hasn't started
            let rect = canvas.getBoundingClientRect();
            playerY = e.clientY - rect.top - paddleHeight / 2;
            playerY = Math.max(0, Math.min(canvas.height - paddleHeight, playerY));
        });

        // Click to Start Logic
        canvas.addEventListener('click', () => {
            if (!isGameRunning) {
                isGameRunning = true;
                resetBall();
            }
        });

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = -ballSpeedX;
            ballSpeedY = (Math.random() * 8) - 4;
        }

        function update() {
            if (!isGameRunning) return; // Do not update if not running

            ballX += ballSpeedX;
            ballY += ballSpeedY;
            const aiSpeed = 7.5; // Slightly slower for better gameplay

            // AI Movement
            if (ballX > canvas.width / 2) {
                if (aiY + paddleHeight / 2 < ballY) {
                    aiY += aiSpeed;
                } else {
                    aiY -= aiSpeed;
                }
            }
            aiY = Math.max(0, Math.min(canvas.height - paddleHeight, aiY));

            // Collision
            if (ballY - ballSize / 2 <= 0 || ballY + ballSize / 2 >= canvas.height) {
                ballSpeedY *= -1;
            }
            if (ballX - ballSize / 2 <= paddleWidth + 10 && ballY > playerY && ballY < playerY + paddleHeight) {
                if (ballSpeedX < 0) ballSpeedX *= -1;
            }
            if (ballX + ballSize / 2 >= canvas.width - paddleWidth - 10 && ballY > aiY && ballY < aiY + paddleHeight) {
                if (ballSpeedX > 0) ballSpeedX *= -1;
            }

            // Scoring
            if (ballX + ballSize / 2 < 0) {
                aiScore++;
                resetBall();
            }
            if (ballX - ballSize / 2 > canvas.width) {
                playerScore++;
                resetBall();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!isGameRunning) {
                // --- DRAW START SCREEN ---
                ctx.fillStyle = 'white';
                ctx.font = '50px Arial';
                ctx.textAlign = 'center';
                ctx.fillText("VERY MUCH PONG", canvas.width / 2, canvas.height / 2 - 30);
                
                // Red Button
                ctx.fillStyle = 'red';
                ctx.fillRect(canvas.width / 2 - 100, canvas.height / 2 + 10, 200, 60);
                
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.fillText("START", canvas.width / 2, canvas.height / 2 + 50);
            } else {
                // --- DRAW GAME ---
                // Player paddle - Dark Green
                ctx.fillStyle = '#006400';
                ctx.fillRect(10, playerY, paddleWidth, paddleHeight);

                // AI paddle - Cyan
                ctx.fillStyle = 'cyan';
                ctx.fillRect(canvas.width - paddleWidth - 10, aiY, paddleWidth, paddleHeight);

                // Ball - Lime
                ctx.fillStyle = 'lime';
                ctx.fillRect(ballX - ballSize / 2, ballY - ballSize / 2, ballSize, ballSize);

                // Draw Scores
                ctx.font = '30px Arial';
                ctx.fillStyle = 'white';
                ctx.fillText(playerScore, canvas.width / 4, 50);
                ctx.fillText(aiScore, 3 * canvas.width / 4, 50);
            }

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
